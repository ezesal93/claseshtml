<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clases HTML</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f4f6f9; color: #1a1a2e; min-height: 100vh; padding: 2rem 1rem; }
    header { text-align: center; margin-bottom: 2.5rem; }
    header h1 { font-size: 2rem; font-weight: 700; color: #1a1a2e; }
    header p { color: #555; margin-top: 0.4rem; font-size: 0.95rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.25rem; max-width: 1100px; margin: 0 auto; }
    .card { background: #ffffff; border-radius: 12px; border: 1px solid #e0e4ef; overflow: hidden; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
    .card-header { display: flex; align-items: center; gap: 10px; padding: 0.85rem 1.1rem; font-weight: 600; font-size: 0.95rem; color: #fff; }
    .card ul { list-style: none; padding: 0.5rem 0; }
    .card ul li a { display: flex; align-items: center; gap: 8px; padding: 0.55rem 1.1rem; font-size: 0.88rem; color: #2c3e6e; text-decoration: none; transition: background 0.15s; border-bottom: 1px solid #f0f0f0; }
    .card ul li:last-child a { border-bottom: none; }
    .card ul li a:hover { background: #f0f4ff; color: #1a1a2e; }
    .card ul li a::before { content: "▶"; font-size: 0.65rem; color: #aab; flex-shrink: 0; }
    #error { text-align: center; color: #c0392b; margin-top: 2rem; display: none; }
    footer { text-align: center; margin-top: 3rem; font-size: 0.8rem; color: #aaa; }
  </style>
</head>
<body>
<header>
  <h1>📚 Clases HTML</h1>
  <p>Selecciona una clase para abrirla</p>
</header>
<div class="grid" id="grid"></div>
<p id="error">No se pudo cargar data.json. Asegúrate de que el archivo existe en el repositorio.</p>
<footer>Clases publicadas con GitHub Pages</footer>
<script>
  const COLORS = [
    '#4e6ef2','#1a9e75','#d85a30','#9b59b6',
    '#2980b9','#e67e22','#16a085','#8e44ad','#c0392b'
  ];

  fetch('data.json')
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(data => {
      const grid = document.getElementById('grid');
      data.asignaturas.forEach((asignatura, i) => {
        const card = document.createElement('div');
        card.className = 'card';

        const header = document.createElement('div');
        header.className = 'card-header';
        header.style.background = COLORS[i % COLORS.length];
        header.textContent = asignatura.categoria;

        const ul = document.createElement('ul');
        asignatura.archivos.forEach(f => {
          const li = document.createElement('li');
          const a = document.createElement('a');
          a.href = f.url;
          a.target = '_blank';
          a.textContent = f.nombre;
          li.appendChild(a);
          ul.appendChild(li);
        });

        card.appendChild(header);
        card.appendChild(ul);
        grid.appendChild(card);
      });
    })
    .catch(() => { document.getElementById('error').style.display = 'block'; });
</script>
</body>
</html>
